# =============================================================================
# Sub2API Docker Compose - Local Development Build
# =============================================================================
# Build from local source code for testing changes.
#
# Usage:
#   docker compose --env-file deploy/.env.dev -f deploy/docker-compose.dev.yml up -d
# =============================================================================

name: sub2api-dev

services:
  postgres:
    image: postgres:18-alpine
    # CUSTOM: Keep development dependencies separate from production.
    container_name: sub2api-dev-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DEV_POSTGRES_PORT:?DEV_POSTGRES_PORT is required}:5432"
    volumes:
      - ./${DEPLOY_ENV:?DEPLOY_ENV is required}_postgres_data:/var/lib/postgresql/data:Z
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-sub2api}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-sub2api}
      - PGDATA=/var/lib/postgresql/data
      - TZ=${TZ:-Asia/Shanghai}
    networks:
      - sub2api-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sub2api} -d ${POSTGRES_DB:-sub2api}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8-alpine
    # CUSTOM: Keep development dependencies separate from production.
    container_name: sub2api-dev-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DEV_REDIS_PORT:?DEV_REDIS_PORT is required}:6379"
    volumes:
      - ./${DEPLOY_ENV:?DEPLOY_ENV is required}_redis_data:/data:Z
    command:
      - sh
      - -c
      - exec redis-server --save 60 1 --appendonly yes --appendfsync everysec --requirepass "$$REDISCLI_AUTH"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - REDISCLI_AUTH=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    networks:
      - sub2api-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

networks:
  sub2api-network:
    driver: bridge
